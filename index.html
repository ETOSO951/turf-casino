<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Bit Ultimate Studio</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050508; color: #f0f0f5; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        h1 { font-size: 1.1rem; margin: 2px 0 8px 0; color: #00ff88; letter-spacing: 2px; font-weight: 900; }
        
        /* 上部コントロール */
        .panel {
            background: #0e0e14; width: 100%; max-width: 1050px;
            padding: 10px; border-radius: 8px; margin-bottom: 6px;
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;
            border: 1px solid #1a1a26;
        }
        .row-flex { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        button {
            background: #ff007f; color: #fff; border: none; padding: 8px 12px;
            font-size: 0.8rem; font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        button.playing { background: #00ff88; color: #000; }
        button.blue-btn { background: #007fff; color: white; }
        
        .control-item { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; }
        input[type="range"] { width: 60px; accent-color: #ff007f; }
        
        /* 長さ表示 */
        .len-btn { background: #1a1a26; color: #fff; padding: 5px 10px; font-size: 0.8rem; border: 1px solid #2d2d3d; }
        .len-display { font-family: monospace; font-weight: bold; color: #00ff88; min-width: 50px; text-align: center; font-size: 0.85rem; }

        /* ジャンプボタンエリア */
        .jump-container {
            display: flex; gap: 4px; flex-wrap: wrap; width: 100%; max-width: 1050px;
            background: #0a0a0f; padding: 4px; border-radius: 6px; margin-bottom: 4px;
        }
        .jump-btn { background: #151520; color: #999; border: 1px solid #222230; padding: 5px 8px; font-size: 0.7rem; border-radius: 4px; }

        /* タイムラインコンテナ */
        .grid-container {
            width: 100%; max-width: 1050px; flex: 1; overflow: auto;
            background: #0e0e14; padding: 6px; border-radius: 8px; border: 1px solid #1a1a26;
            scroll-behavior: smooth;
        }
        .sequencer-wrapper { display: flex; position: relative; }
        
        /* 固定音名ラベル */
        .labels {
            position: sticky; left: 0; background: #0e0e14; z-index: 10;
            display: flex; flex-direction: column; gap: 2px; padding-right: 6px;
            border-right: 2px solid #1a1a26; margin-top: 24px; /* 再生位置バーの分下げる */
        }
        .label-cell {
            height: 20px; width: 75px; font-size: 0.6rem; display: flex;
            align-items: center; justify-content: flex-end; color: #737383;
            font-family: monospace; font-weight: bold;
        }
        .label-cell.black-key { color: #ffaa00; background: rgba(255,170,0,0.03); }
        .label-cell.tri-key { color: #00aaff; } 
        .label-cell.drum-key { color: #00ff88; }

        /* メインエリア */
        .sequencer-main { display: flex; flex-direction: column; }
        
        /* 🌟 再生位置指定トップバー */
        .timeline-bar {
            display: grid; gap: 2px; height: 22px; margin-bottom: 2px;
            position: sticky; top: 0; background: #0e0e14; z-index: 5;
        }
        .bar-cell {
            background: #222230; color: #888; font-size: 0.6rem; font-family: monospace;
            text-align: center; line-height: 22px; cursor: pointer; border-radius: 2px; font-weight: bold;
        }
        .bar-cell:active { background: #00ff88; color: #000; }
        .bar-cell.start-marker { background: #00ff88; color: #000; } /* 現在の開始位置 */

        .sequencer { display: grid; gap: 2px; }
        
        /* ノートボタン */
        .note-btn { height: 20px; width: 30px; border-radius: 2px; cursor: pointer; background: #151522; border: 1px solid rgba(255,255,255,0.01); }
        .note-btn.black-bg { background: #0b0b12; } 
        
        /* 発光カラー区分 */
        .note-btn[data-sound="square"].active { background: #ff007f; box-shadow: 0 0 5px #ff007f; }
        .note-btn[data-sound="triangle"].active { background: #00aaff; box-shadow: 0 0 5px #00aaff; }
        .note-btn[data-type="drum"].active { background: #00ff88; box-shadow: 0 0 5px #00ff88; }

        /* 再生ラインと4拍ごとの区切り */
        .note-btn.current-step, .bar-cell.current-step { filter: brightness(1.8); border: 1px solid #fff; }
        .note-btn.beat-line { border-left: 1px solid #333348; }

        /* 🌟 下部データコピペ用エリア */
        .storage-panel {
            width: 100%; max-width: 1050px; background: #0e0e14; padding: 8px;
            border-radius: 6px; margin-top: 6px; border: 1px solid #1a1a26;
            display: flex; flex-direction: column; gap: 4px;
        }
        .storage-title { font-size: 0.7rem; color: #aaa; font-weight: bold; display: flex; justify-content: space-between; }
        .storage-box {
            width: 100%; background: #050508; color: #00ff88; border: 1px solid #222233;
            padding: 6px; font-family: monospace; font-size: 0.65rem; border-radius: 4px;
            resize: none; -webkit-user-select: text; user-select: text; /* 文字列を選択可能に */
        }
    </style>
</head>
<body>

    <h1>8-BIT ULTIMATE STUDIO</h1>

    <div class="panel">
        <div class="row-flex">
            <button id="playBtn">再生 / 停止</button>
            <div class="control-item">
                <label>BPM:<span id="bpmVal">130</span></label>
                <input type="range" id="bpmSlider" min="60" max="240" value="130">
            </div>
            
            <div class="control-item" style="background: #151522; padding: 2px 6px; border-radius: 4px; border: 1px solid #222235;">
                <label style="color:#aaa;">長さ:</label>
                <button class="len-btn" id="lenMinus">－</button>
                <span class="len-display" id="lenDisplay">32 歩</span>
                <button class="len-btn" id="lenPlus">＋</button>
            </div>
        </div>
        
        <div class="row-flex">
            <button class="blue-btn" id="exportBtn">🎵 WAV音声として保存</button>
            <button id="clearBtn" style="background:#222235; color:#aaa;">クリア</button>
        </div>
    </div>

    <div class="jump-container" id="jumpContainer"></div>

    <div class="grid-container" id="gridContainer">
        <div class="sequencer-wrapper">
            <div class="labels" id="labelsContainer"></div>
            
            <div class="sequencer-main">
                <div class="timeline-bar" id="timelineBar"></div>
                <div class="sequencer" id="sequencer"></div>
            </div>
        </div>
    </div>

    <div class="storage-panel">
        <div class="storage-title">
            <span>💾 バックアップ＆移行用データコード（ここからコピーして保存できます）</span>
            <button id="manualLoadBtn" style="background:#222235; padding: 2px 8px; font-size:0.65rem;">貼り付けたコードを読み込む</button>
        </div>
        <textarea class="storage-box" id="storageBox" rows="2" readonly onclick="this.select();"></textarea>
    </div>

    <script>
        const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const allTracks = [];
        
        // 1. 【拡張】スクエア波（高音・中音域）：3オクターブ（C4〜B6）計36音
        for (let midi = 95; midi >= 60; midi--) {
            const octave = Math.floor(midi / 12) - 1;
            const name = noteNames[midi % 12] + octave;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            allTracks.push({ name: name, freq: freq, type: 'synth', sound: 'square', isBlack: name.includes('#') });
        }

        // 2. 【拡張】三角波ベース（低音域）：3オクターブ（C1〜B3）計36音
        for (let midi = 59; midi >= 24; midi--) {
            const octave = Math.floor(midi / 12) - 1;
            const name = noteNames[midi % 12] + octave + "(Tri)";
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            allTracks.push({ name: name, freq: freq, type: 'synth', sound: 'triangle', isBlack: name.includes('#') });
        }

        // 3. 【拡張】リズムトラック（高・中・低のバリエーション計6ライン）
        allTracks.push({ name: 'NOISE-H', freq: 900, type: 'drum', sound: 'noise', isBlack: false });
        allTracks.push({ name: 'NOISE-M', freq: 500, type: 'drum', sound: 'noise', isBlack: false });
        allTracks.push({ name: 'NOISE-L', freq: 200, type: 'drum', sound: 'noise', isBlack: false });
        allTracks.push({ name: 'PULSE-H', freq: 160, type: 'drum', sound: 'pulse', isBlack: false });
        allTracks.push({ name: 'PULSE-M', freq: 100, type: 'drum', sound: 'pulse', isBlack: false });
        allTracks.push({ name: 'PULSE-L', freq: 60, type: 'drum', sound: 'pulse', isBlack: false });

        const maxSteps = 128; 
        let totalSteps = 32; 
        
        let gridState = Array(allTracks.length).fill().map(() => Array(maxSteps).fill(false));
        
        // ローカルストレージ読み込み
        const savedData = localStorage.getItem('ultra_sequencer_save');
        const savedLength = localStorage.getItem('ultra_sequencer_length');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            if (parsed.length === allTracks.length) gridState = parsed;
        }
        if (savedLength) totalSteps = parseInt(savedLength);

        let isPlaying = false, currentStep = 0, nextTickTime = 0.0, timerId = null, audioCtx = null;
        let startFromStep = 0; // 🌟 途中再生の開始位置記録用
        let bpm = 130;

        const sequencerEl = document.getElementById('sequencer');
        const timelineBar = document.getElementById('timelineBar');
        const labelsContainer = document.getElementById('labelsContainer');
        const jumpContainer = document.getElementById('jumpContainer');
        const gridContainer = document.getElementById('gridContainer');
        const lenDisplay = document.getElementById('lenDisplay');
        const storageBox = document.getElementById('storageBox');

        // 音階ラベル生成
        allTracks.forEach((track) => {
            const lbl = document.createElement('div');
            lbl.classList.add('label-cell');
            if (track.isBlack) lbl.classList.add('black-key');
            if (track.sound === 'triangle') lbl.classList.add('tri-key');
            if (track.type === 'drum') lbl.classList.add('drum-key');
            lbl.innerText = track.name;
            labelsContainer.appendChild(lbl);
        });

        // 画面とグリッドの完全再構築
        function buildGrid() {
            sequencerEl.innerHTML = '';
            timelineBar.innerHTML = '';

            // 列幅を同期
            sequencerEl.style.gridTemplateColumns = `repeat(${totalSteps}, 30px)`;
            timelineBar.style.gridTemplateColumns = `repeat(${totalSteps}, 30px)`;
            lenDisplay.innerText = `${totalSteps} 歩`;

            // 🌟 再生位置指定バーのマス生成
            for (let c = 0; c < totalSteps; c++) {
                const barCell = document.createElement('div');
                barCell.classList.add('bar-cell');
                barCell.innerText = c + 1;
                barCell.dataset.stepIndex = c;
                if (c === startFromStep) barCell.classList.add('start-marker');

                // バーをタップした時に再生位置をそこへジャンプ
                barCell.addEventListener('click', () => {
                    startFromStep = c;
                    currentStep = c;
                    
                    // マーカー表示の更新
                    document.querySelectorAll('.bar-cell').forEach(cell => cell.classList.remove('start-marker'));
                    barCell.classList.add('start-marker');

                    if (isPlaying && audioCtx) {
                        nextTickTime = audioCtx.currentTime + 0.02; // 再生中なら即位置変更
                    } else {
                        // 停止中ならラインだけ移動して見せる
                        document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('current-step'));
                        document.querySelectorAll(`[data-col="${c}"]`).forEach(b => b.classList.add('current-step'));
                    }
                });
                timelineBar.appendChild(barCell);
            }

            // ノートグリッドの生成
            allTracks.forEach((track, r) => {
                for (let c = 0; c < totalSteps; c++) {
                    const btn = document.createElement('div');
                    btn.classList.add('note-btn');
                    if (track.isBlack) btn.classList.add('black-bg');
                    if (c % 4 === 0 && c > 0) btn.classList.add('beat-line');
                    
                    btn.dataset.row = r;
                    btn.dataset.col = c;
                    btn.dataset.type = track.type;
                    btn.dataset.sound = track.sound;

                    if (gridState[r][c]) btn.classList.add('active');

                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        gridState[r][c] = !gridState[r][c];
                        btn.classList.toggle('active', gridState[r][c]);
                        saveAndRefreshExportString();
                        if (gridState[r][c]) triggerSound(track, audioCtx ? audioCtx.currentTime : 0);
                    });
                    sequencerEl.appendChild(btn);
                }
            });

            buildJumpButtons();
            updateExportString(); // テキストエリアの文字列を同期
        }

        function buildJumpButtons() {
            jumpContainer.innerHTML = '';
            const chunk = 16;
            const buttonCount = Math.ceil(totalSteps / chunk);
            for (let i = 0; i < buttonCount; i++) {
                const start = i * chunk + 1;
                const btn = document.createElement('button');
                btn.classList.add('jump-btn');
                btn.innerText = `▶ ${start}～`;
                btn.addEventListener('click', () => {
                    gridContainer.scrollTo({ left: i * chunk * 32, behavior: 'smooth' });
                });
                jumpContainer.appendChild(btn);
            }
        }

        // 保存 & 文字列テキストのリアルタイム同期
        function saveAndRefreshExportString() {
            localStorage.setItem('ultra_sequencer_save', JSON.stringify(gridState));
            localStorage.setItem('ultra_sequencer_length', totalSteps.toString());
            updateExportString();
        }

        function updateExportString() {
            const activeNotes = [];
            allTracks.forEach((_, r) => {
                for (let c = 0; c < totalSteps; c++) {
                    if (gridState[r][c]) activeNotes.push(`${r}:${c}`);
                }
            });
            storageBox.value = `${totalSteps}|${activeNotes.join(',')}`;
        }

        // 📥 テキストエリアから手動で文字列を読み込んで曲を復元
        document.getElementById('manualLoadBtn').addEventListener('click', () => {
            // 読み込み前に全選択対応のため中身を取得
            const code = storageBox.value.trim();
            if (!code || !code.includes('|')) {
                alert("ボックスに正しいデータコードを貼り付けてから押してください。");
                return;
            }
            try {
                const parts = code.split('|');
                const newSteps = parseInt(parts[0]);
                if (isNaN(newSteps) || newSteps < 1 || newSteps > maxSteps) throw new Error();

                const newGridState = Array(allTracks.length).fill().map(() => Array(maxSteps).fill(false));
                if (parts[1] !== "") {
                    parts[1].split(',').forEach(coord => {
                        const xy = coord.split(':');
                        const r = parseInt(xy[0]), c = parseInt(xy[1]);
                        if (r >= 0 && r < allTracks.length && c >= 0 && c < maxSteps) newGridState[r][c] = true;
                    });
                }
                totalSteps = newSteps;
                gridState = newGridState;
                startFromStep = 0; currentStep = 0;
                localStorage.setItem('ultra_sequencer_save', JSON.stringify(gridState));
                localStorage.setItem('ultra_sequencer_length', totalSteps.toString());
                buildGrid();
                alert("テキストコードから曲を完全に復元しました！");
            } catch (e) {
                alert("コードの形式が正しくありません。変更せずにそのまま貼り付けてください。");
            }
        });

        // 8bit オーディオシンセノード生成
        function createSynthNode(ctx, track, startTime) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);

            if (track.sound === 'square') {
                osc.type = 'square'; osc.frequency.setValueAtTime(track.freq, startTime);
                gain.gain.setValueAtTime(0.04, startTime);
                gain.gain.linearRampToValueAtTime(0.001, startTime + 0.15);
                osc.start(startTime); osc.stop(startTime + 0.15);
            } 
            else if (track.sound === 'triangle') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(track.freq, startTime);
                gain.gain.setValueAtTime(0.16, startTime);
                gain.gain.linearRampToValueAtTime(0.001, startTime + 0.22);
                osc.start(startTime); osc.stop(startTime + 0.22);
            }
            else if (track.sound === 'pulse') {
                osc.type = 'square'; osc.frequency.setValueAtTime(track.freq, startTime);
                osc.frequency.linearRampToValueAtTime(20, startTime + 0.09);
                gain.gain.setValueAtTime(0.18, startTime);
                gain.gain.linearRampToValueAtTime(0.001, startTime + 0.1);
                osc.start(startTime); osc.stop(startTime + 0.1);
            } 
            else if (track.sound === 'noise') {
                osc.type = 'square';
                const baseF = track.freq;
                osc.frequency.setValueAtTime(baseF + Math.random() * baseF, startTime);
                osc.frequency.linearRampToValueAtTime(40, startTime + 0.07);
                gain.gain.setValueAtTime(0.07, startTime);
                gain.gain.linearRampToValueAtTime(0.001, startTime + 0.07);
                osc.start(startTime); osc.stop(startTime + 0.07);
            }
        }

        function triggerSound(track, time) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            createSynthNode(audioCtx, track, time);
        }

        // 高精度ループタイマー
        function scheduler() {
            while (nextTickTime < audioCtx.currentTime + 0.1) {
                scheduleNextStep(currentStep, nextTickTime);
                const secondsPerBeat = 60.0 / bpm;
                nextTickTime += secondsPerBeat / 4;
                currentStep = (currentStep + 1) % totalSteps;
            }
            timerId = setTimeout(scheduler, 25);
        }

        function scheduleNextStep(step, time) {
            setTimeout(() => {
                // 再生ライン表示のリセットと描画
                document.querySelectorAll('.note-btn, .bar-cell').forEach(b => b.classList.remove('current-step'));
                
                const currentButtons = sequencerEl.querySelectorAll(`[data-col="${step}"]`);
                currentButtons.forEach(b => b.classList.add('current-step'));
                
                const barCell = timelineBar.querySelector(`[data-step-index="${step}"]`);
                if (barCell) barCell.classList.add('current-step');

                // 自動スクロール追従（16マスごと）
                if (isPlaying && step % 16 === 0) {
                    gridContainer.scrollTo({ left: Math.floor(step / 16) * 16 * 32, behavior: 'smooth' });
                }
            }, (time - audioCtx.currentTime) * 1000);

            // ノート再生
            allTracks.forEach((track, r) => {
                if (gridState[r][step]) triggerSound(track, time);
            });
        }

        // イベント制御
        document.getElementById('playBtn').addEventListener('click', (e) => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearTimeout(timerId); isPlaying = false;
                e.target.classList.remove('playing');
                document.querySelectorAll('.note-btn, .bar-cell').forEach(b => b.classList.remove('current-step'));
            } else {
                // 🌟 指定された「途中再生位置」からスタートする
                currentStep = startFromStep;
                gridContainer.scrollTo({ left: Math.floor(startFromStep / 16) * 16 * 32, behavior: 'smooth' });
                nextTickTime = audioCtx.currentTime + 0.05;
                scheduler(); isPlaying = true;
                e.target.classList.add('playing');
            }
        });

        document.getElementById('lenPlus').addEventListener('click', () => {
            if (totalSteps < maxSteps) { totalSteps++; saveAndRefreshExportString(); buildGrid(); }
        });
        document.getElementById('lenMinus').addEventListener('click', () => {
            if (totalSteps > 4) {
                totalSteps--;
                if (currentStep >= totalSteps) currentStep = 0;
                if (startFromStep >= totalSteps) startFromStep = 0;
                saveAndRefreshExportString(); buildGrid();
            }
        });

        document.getElementById('bpmSlider').addEventListener('input', (e) => {
            bpm = parseInt(e.target.value); document.getElementById('bpmVal').innerText = bpm;
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if(confirm("曲を完全にクリアしますか？")) {
                gridState = Array(allTracks.length).fill().map(() => Array(maxSteps).fill(false));
                startFromStep = 0; currentStep = 0;
                saveAndRefreshExportString(); buildGrid();
            }
        });

        // WAVエクスポート
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const exportBtn = document.getElementById('exportBtn');
            exportBtn.disabled = true; exportBtn.innerText = "WAV生成中...";

            try {
                const stepDuration = (60.0 / bpm) / 4;
                const totalDuration = totalSteps * stepDuration + 0.6;
                const sampleRate = 44100;
                const offlineCtx = new OfflineAudioContext(1, sampleRate * totalDuration, sampleRate);

                for (let step = 0; step < totalSteps; step++) {
                    const startTime = step * stepDuration;
                    allTracks.forEach((track, r) => {
                        if (gridState[r][step]) createSynthNode(offlineCtx, track, startTime);
                    });
                }

                const renderedBuffer = await offlineCtx.startRendering();
                const wavBlob = bufferToWav(renderedBuffer);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url; a.download = `8bit_track_${totalSteps}steps.wav`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            } catch (error) {
                alert("保存エラー: 開いているブラウザ、または端末がWAV生成に対応していない可能性があります。下部の文字列コードによるバックアップをお試しください。");
            }
            exportBtn.disabled = false; exportBtn.innerText = "🎵 WAV音声として保存";
        });

        // オーディオバッファをWAVにパック
        function bufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [];

            let idx = 0;
            function setUint32(data) { view.setUint32(idx, data); idx += 4; }
            function setUint16(data) { view.setUint16(idx, data, true); idx += 2; }

            setUint32(0x46464952); view.setUint32(4, length - 8, true); idx += 4;
            setUint32(0x45564157); setUint32(0x20746d66); view.setUint32(16, 16, true); idx += 4;
            setUint16(1); setUint16(numOfChan);
            view.setUint32(24, buffer.sampleRate, true); idx += 4;
            view.setUint32(28, buffer.sampleRate * 2 * numOfChan, true); idx += 4;
            setUint16(numOfChan * 2); setUint16(16);
            setUint32(0x61746164); view.setUint32(40, length - 44, true); idx += 4;

            for(let i=0; i<buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
            for (let i = 0; i < buffer.length; i++) {
                for (let channel = 0; channel < numOfChan; channel++) {
                    let sample = channels[channel][i];
                    sample = Math.max(-1, Math.min(1, sample));
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    view.setInt16(idx, sample, true); idx += 2;
                }
            }
            return new Blob([bufferArr], { type: 'audio/wav' });
        }

        // 初期ロード
        buildGrid();
    </script>
