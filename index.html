<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G1ターフカジノ Pro - Stable Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --turf: #0a2e1a; --gold: #ffd700; --panel: rgba(15,15,15,0.98); --accent: #00ff88; --red: #ff4757; --blue: #54a0ff; --warning: #ff9f43; }
        body { font-family: sans-serif; background: var(--turf); color: #fff; margin: 0; padding: 10px; -webkit-text-size-adjust: 100%; }
        .container { max-width: 600px; margin: auto; }
        .board { background: var(--panel); border: 2px solid var(--gold); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { background: linear-gradient(to bottom, #ffd700, #b8860b); border: none; padding: 16px; color: #000; font-weight: bold; border-radius: 8px; width: 100%; margin: 8px 0; font-size: 16px; cursor: pointer; text-align: center; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #333; margin: 5px 0; background: #000; color: #fff; font-size: 16px; }
        #countdown-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; font-weight: bold; color: var(--gold); text-shadow: 0 0 30px #000; z-index: 10001; display: none; pointer-events: none; }
        #debug-log { font-size: 10px; color: #888; background: #000; padding: 8px; margin-top: 20px; border-radius: 6px; border: 1px solid #333; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="countdown-overlay">10</div>

<div class="container">
    <div id="setup-screen" class="board">
        <h2 style="text-align:center; color:var(--gold);">G1 ターフカジノ</h2>
        <input type="text" id="roomName" placeholder="部屋の合言葉（例: turf123）">
        <div style="margin: 10px 0; padding: 10px; border: 1px solid #444; border-radius: 8px;">
            <label style="font-size:12px;">シリーズ戦のレース数 (ホストのみ):</label>
            <input type="number" id="seriesCount" value="3" min="1">
        </div>
        <button class="btn" onclick="initPeer('host')">ホスト(親機)を開始</button>
        <button class="btn" onclick="initPeer('monitor')" style="background:var(--blue); color:#fff;">モニター(画面)を開始</button>
        <button class="btn" onclick="initPeer('guest')" style="background:#fff; color:#000;">ゲスト(子機)として参加</button>
        <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
        <button class="btn" onclick="switchMode('edit')" style="background:#444; color:#fff; font-size: 14px; padding: 10px;">レースデータを登録・編集する</button>
    </div>

    <!-- ゲスト用名前入力 -->
    <div id="guest-join-screen" class="board hidden">
        <h3>プレイヤー登録</h3>
        <input type="text" id="playerName" placeholder="あなたの名前">
        <button class="btn" onclick="guestJoinSeries()">参加を確定する</button>
    </div>

    <!-- ホスト操作画面 -->
    <div id="host-screen" class="hidden">
        <div class="board">
            <div style="display:flex; justify-content:space-between;">
                <span id="host-status" style="color:var(--accent);">Race: 0/0</span>
                <span id="player-count">参加: 0名</span>
            </div>
            <h2 id="host-race-title" style="text-align:center; color:var(--gold); margin: 15px 0;">レース未設定</h2>
            <div id="host-odds-display"></div>
            <button id="setRaceBtn" class="btn" onclick="pickRaceFromList()">次のレースを抽選</button>
            <button id="startCountdownBtn" class="btn" onclick="startCountdownSequence()" disabled style="background:var(--red); color:#fff;">カウントダウン開始</button>
        </div>
    </div>

    <!-- モニター画面 -->
    <div id="monitor-screen" class="hidden">
        <div class="board" style="text-align:center;">
            <h3 id="mon-race-num" style="color:var(--accent);">READY</h3>
            <h1 id="monitor-race-name" style="color:var(--gold);">待機中</h1>
            <div id="monitor-odds-list" style="font-size:20px; text-align: left;"></div>
        </div>
    </div>

    <!-- ゲスト操作画面 -->
    <div id="guest-screen" class="hidden">
        <div class="board">
            <div style="display:flex; justify-content:space-between;">
                <b id="display-player-name">---</b>
                <span id="my-chips" style="color:var(--gold); font-weight:bold;">1,000</span>
            </div>
            <h3 id="guest-race-name" style="text-align:center; color:var(--accent);">ホストの指示を待っています...</h3>
            <div id="betting-area"></div>
        </div>
    </div>

    <!-- レース管理画面 -->
    <div id="registration-area" class="hidden">
        <div class="board">
            <h3>🏁 レース編集</h3>
            <input type="hidden" id="editingId">
            <input type="text" id="raceName" placeholder="レース名">
            <input type="file" id="videoFile" accept="video/*">
            <div id="horse-inputs"></div>
            <button class="btn" onclick="addHorseField()" style="background:#333; color:#fff;">+ 馬を追加</button>
            <button class="btn" onclick="applyToPool()">保存する</button>
            <button class="btn" onclick="switchMode('play')" style="background:#666; color:#fff;">戻る</button>
        </div>
        <div id="race-list-display"></div>
    </div>

    <div id="debug-log">システムログ: 待機中...</div>
</div>

<video id="mainVideo" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:9999;" playsinline></video>

<script>
// --- グローバル変数 ---
let racePool = [], videoMap = new Map();
let peer = null, connections = [], guestConn = null;
let currentRace = null, myChips = 1000, myRole = '', myName = '';
let seriesTotal = 0, currentRaceNum = 0;
let tempBets = {}, fixedBets = {};

function log(msg) {
    console.log(msg);
    const el = document.getElementById('debug-log');
    if(el) el.innerText = msg;
}

// --- 初期化 ---
window.onload = async () => {
    log("システム初期化中...");
    try {
        const saved = localStorage.getItem('turf_race_pool');
        if(saved) racePool = JSON.parse(saved);
        updateRaceListUI();
    } catch(e) { log("データ読み込み失敗: " + e); }
    addHorseField(); addHorseField();
};

// --- モード切替 ---
function switchMode(mode) {
    document.getElementById('setup-screen').classList.toggle('hidden', mode !== 'play');
    document.getElementById('registration-area').classList.toggle('hidden', mode !== 'edit');
}

// --- 通信関連 ---
function initPeer(role) {
    const room = document.getElementById('roomName').value.trim();
    if(!room) { alert("合言葉を入力してください"); return; }
    myRole = role;

    try {
        const pid = (role === 'host') ? room : (role === 'monitor' ? room + "_mon" : room + "_g" + Math.random().toString(36).slice(-4));
        peer = new Peer(pid);
        
        peer.on('open', (id) => {
            log(role + "として接続完了 ID: " + id);
            document.getElementById('setup-screen').classList.add('hidden');
            if(role === 'host') {
                seriesTotal = parseInt(document.getElementById('seriesCount').value) || 3;
                document.getElementById('host-screen').classList.remove('hidden');
                document.getElementById('host-status').innerText = `Race: 0/${seriesTotal}`;
                peer.on('connection', c => {
                    connections.push(c);
                    c.on('data', d => handleHostData(d, c));
                    log("ゲストが接続しました");
                });
            } else {
                guestConn = peer.connect(room);
                guestConn.on('open', () => {
                    if(role === 'guest') document.getElementById('guest-join-screen').classList.remove('hidden');
                    if(role === 'monitor') document.getElementById('monitor-screen').classList.remove('hidden');
                });
                guestConn.on('data', handleClientData);
            }
        });

        peer.on('error', err => {
            log("Peerエラー: " + err.type);
            alert("接続エラーが発生しました。合言葉が重複しているか、通信環境が不安定です。");
        });
    } catch(e) {
        log("Peer起動失敗: " + e);
    }
}

// --- ゲスト処理 ---
function guestJoinSeries() {
    const n = document.getElementById('playerName').value.trim();
    if(!n) return;
    myName = n;
    guestConn.send({ type: 'JOIN', name: n });
    document.getElementById('guest-join-screen').classList.add('hidden');
    document.getElementById('guest-screen').classList.remove('hidden');
    document.getElementById('display-player-name').innerText = n;
}

// --- ホスト処理 ---
function handleHostData(d, conn) {
    if(d.type === 'JOIN') {
        document.getElementById('player-count').innerText = `参加: ${connections.length}名`;
        conn.send({ type: 'SYNC_SERIES', total: seriesTotal });
    }
    if(d.type === 'BET') {
        const h = currentRace.horses[d.idx];
        h.pool += d.amount;
        updateOddsCalculation();
        broadcast({ type: 'UPDATE_ODDS', horses: currentRace.horses });
    }
}

function pickRaceFromList() {
    if(racePool.length === 0) { alert("レースを登録してください"); return; }
    currentRaceNum++;
    currentRace = JSON.parse(JSON.stringify(racePool[Math.floor(Math.random()*racePool.length)]));
    document.getElementById('host-race-title').innerText = currentRace.name;
    document.getElementById('host-status').innerText = `Race: ${currentRaceNum}/${seriesTotal}`;
    document.getElementById('setRaceBtn').disabled = true;
    document.getElementById('startCountdownBtn').disabled = false;
    updateHostUI();
    broadcast({ type: 'RACE_SET', race: currentRace, num: currentRaceNum });
}

function updateOddsCalculation() {
    const total = currentRace.horses.reduce((s, x) => s + x.pool, 0);
    const weight = 1000;
    currentRace.horses.forEach(x => {
        let n = (x.initialOdds * (total + weight)) / (x.pool + weight);
        x.currentOdds = Math.max(1.1, n);
    });
    updateHostUI();
}

function updateHostUI() {
    document.getElementById('host-odds-display').innerHTML = currentRace.horses.map(h => 
        `<div style="display:flex; justify-content:space-between;"><span>${h.name}</span><span>x${h.currentOdds.toFixed(2)}</span></div>`
    ).join('');
}

function startCountdownSequence() {
    document.getElementById('startCountdownBtn').disabled = true;
    let count = 10;
    const timer = setInterval(() => {
        broadcast({ type: 'COUNTDOWN', val: count });
        if(count <= 0) {
            clearInterval(timer);
            broadcast({ type: 'START_VIDEO', raceId: currentRace.id });
        }
        count--;
    }, 1000);
}

function broadcast(data) {
    connections.forEach(c => { if(c.open) c.send(data); });
}

// --- クライアント処理 ---
function handleClientData(d) {
    if(d.type === 'SYNC_SERIES') seriesTotal = d.total;
    if(d.type === 'RACE_SET') {
        currentRace = d.race; currentRaceNum = d.num;
        fixedBets = {}; tempBets = {};
        if(myRole === 'guest') renderGuestBetting();
        if(myRole === 'monitor') renderMonitorUI();
    }
    if(d.type === 'UPDATE_ODDS') {
        currentRace.horses = d.horses;
        if(myRole === 'guest') updateGuestOddsUI();
        if(myRole === 'monitor') renderMonitorUI();
    }
    if(d.type === 'COUNTDOWN') {
        const overlay = document.getElementById('countdown-overlay');
        overlay.innerText = d.val > 0 ? d.val : "START!";
        overlay.style.display = 'block';
    }
    if(d.type === 'START_VIDEO') {
        document.getElementById('countdown-overlay').style.display = 'none';
        if(myRole === 'monitor') log("動画再生が始まります（モニター機）");
    }
}

// --- レース編集用 ---
function addHorseField() {
    const container = document.getElementById('horse-inputs');
    if(!container) return;
    const div = document.createElement('div');
    div.className = 'horse-input-row';
    div.style = "display:grid; grid-template-columns: 2fr 1fr 1fr 30px; gap:5px; margin-bottom:5px;";
    div.innerHTML = `
        <input type="text" placeholder="馬名" class="h-name">
        <input type="number" step="0.1" value="2.0" class="h-odds">
        <select class="h-rank">
            ${[1,2,3,4,5,6,7,8].map(n => `<option value="${n}">${n}着</option>`).join('')}
        </select>
        <button onclick="this.parentElement.remove()" style="background:none; color:red; border:none;">×</button>
    `;
    container.appendChild(div);
}

async function applyToPool() {
    const name = document.getElementById('raceName').value.trim();
    if(!name) { alert("レース名を入れてください"); return; }
    
    const id = "R_" + Date.now();
    const horses = Array.from(document.querySelectorAll('.horse-input-row')).map(row => ({
        name: row.querySelector('.h-name').value || "無名馬",
        initialOdds: parseFloat(row.querySelector('.h-odds').value) || 2.0,
        currentOdds: parseFloat(row.querySelector('.h-odds').value) || 2.0,
        rank: parseInt(row.querySelector('.h-rank').value),
        pool: 0
    }));

    racePool.push({ id, name, horses });
    localStorage.setItem('turf_race_pool', JSON.stringify(racePool));
    alert("保存しました");
    updateRaceListUI();
}

function updateRaceListUI() {
    const list = document.getElementById('race-list-display');
    if(!list) return;
    list.innerHTML = racePool.map((r, i) => `
        <div style="padding:10px; border-bottom:1px solid #444; display:flex; justify-content:space-between;">
            <span>${r.name}</span>
            <button onclick="racePool.splice(${i},1); updateRaceListUI();" style="background:red; color:white; border:none; border-radius:4px;">削除</button>
        </div>
    `).join('');
}

// --- ゲスト・モニター描画 ---
function renderGuestBetting() {
    document.getElementById('guest-race-name').innerText = currentRace.name;
    document.getElementById('betting-area').innerHTML = currentRace.horses.map((h, i) => `
        <div style="border-bottom:1px solid #333; padding:10px 0;">
            <b>${h.name}</b> <span id="g-odd-${i}" style="color:var(--gold)">x${h.currentOdds.toFixed(2)}</span>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button onclick="addBet(${i}, 10)" style="flex:1; padding:10px;">+10</button>
                <button onclick="addBet(${i}, 100)" style="flex:1; padding:10px;">+100</button>
            </div>
            <div id="bet-fixed-${i}" style="font-size:12px; margin-top:5px;">確定: 0</div>
        </div>
    `).join('');
}
function addBet(i, a) {
    if(myChips < a) return;
    myChips -= a;
    fixedBets[i] = (fixedBets[i] || 0) + a;
    document.getElementById('my-chips').innerText = myChips.toLocaleString();
    document.getElementById(`bet-fixed-${i}`).innerText = `確定: ${fixedBets[i]}`;
    guestConn.send({ type: 'BET', idx: i, amount: a });
}
function updateGuestOddsUI() {
    currentRace.horses.forEach((h, i) => {
        const el = document.getElementById(`g-odd-${i}`);
        if(el) el.innerText = 'x' + h.currentOdds.toFixed(2);
    });
}
function renderMonitorUI() {
    document.getElementById('mon-race-num').innerText = `RACE ${currentRaceNum}/${seriesTotal}`;
    document.getElementById('monitor-race-name').innerText = currentRace.name;
    document.getElementById('monitor-odds-list').innerHTML = currentRace.horses.map(h => 
        `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222;">
            <span>${h.name}</span><span>x${h.currentOdds.toFixed(2)}</span>
        </div>`
    ).join('');
}
</script>
</body>
</html>
