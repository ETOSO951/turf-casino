<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G1 TURF CASINO - v24 Seamless Reset</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --turf: #0a2e1a; --gold: #ffd700; --panel: rgba(0,0,0,0.95); --accent: #00ff88; --red: #ff4757; --blue: #54a0ff; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, var(--turf) 0%, #0d1f2d 100%); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; min-height: 100vh; }
        .container { max-width: 600px; margin: auto; }
        .board { background: rgba(0,0,0,0.7); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .btn { background: linear-gradient(180deg, var(--gold) 0%, #b8860b 100%); border: none; padding: 15px; color: #000; font-weight: bold; border-radius: 10px; width: 100%; margin: 10px 0; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(255,215,0,0.3); transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,215,0,0.5); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #664d00; }
        .mini-btn { padding: 10px; font-size: 12px; border-radius: 5px; border: none; cursor: pointer; color: #fff; font-weight: bold; margin: 2px; transition: all 0.2s; }
        .mini-btn:hover { transform: translateY(-1px); }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px; border: 1px solid #444; margin: 5px 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.3); background: rgba(0,0,0,0.8); }
        .race-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .race-card:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        #countdown-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; font-weight: bold; color: var(--gold); z-index: 10001; display: none; pointer-events: none; text-shadow: 0 0 30px rgba(255,215,0,0.8); }
        #result-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(10,46,26,0.9)); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .horse-input-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 5px; margin-bottom: 10px; }
        .config-preset { background: rgba(0,255,136,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .rank-item { background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(0,255,136,0.1)); padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--gold); }
        .rank-medal { font-size: 2.5em; min-width: 50px; text-align: center; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 1.3em; font-weight: bold; color: var(--gold); margin-bottom: 5px; }
        .rank-chips { font-size: 1.1em; color: var(--accent); }
        .result-winner { font-size: 5em; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.6); margin: 20px 0; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .payout-item { background: rgba(0,255,136,0.15); padding: 12px 15px; border-radius: 8px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }
        .payout-name { font-weight: bold; font-size: 1.1em; }
        .payout-amount { color: var(--accent); font-size: 1.2em; font-weight: bold; }
        .betting-card { background: linear-gradient(135deg, rgba(84,160,255,0.1), rgba(0,255,136,0.05)); padding: 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(84,160,255,0.3); }
        .horse-name { font-size: 1.2em; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .odds-display { color: var(--gold); font-size: 1.3em; font-weight: bold; }
        .bet-buttons { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .status-line { font-size: 0.9em; color: #aaa; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 5px; }
        .nav-tabs { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        #mon-race-name { text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .horse-stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .horse-stat:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div id="countdown-overlay">10</div>

<!-- リザルト画面 -->
<div id="result-screen">
    <div id="res-race-part">
        <h1 style="color:var(--accent); font-size:3em; margin:0 0 20px 0;">🏁 RACE RESULT 🏁</h1>
        <div class="result-winner" id="res-winner">---</div>
        <div id="res-payout-list" style="width:100%; max-width:400px; margin-top:30px;"></div>
    </div>
    <div id="res-final-part" class="hidden">
        <h2 style="color:var(--gold); font-size: 3em; margin:0 0 40px 0;">🏆 FINAL RANKING 🏆</h2>
        <div id="final-rank-list" style="width:100%; max-width:450px;"></div>
    </div>
</div>

<div class="container">
    <div id="nav-tabs" class="nav-tabs" style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn" onclick="showSection('setup-screen')" style="margin:0; flex:1; font-size:14px; padding:12px;">設定</button>
        <button class="btn" onclick="openEditor()" style="margin:0; flex:1; background:#333; color:#fff; font-size:14px; padding:12px;">データ管理</button>
    </div>

    <!-- 1. 初期設定 -->
    <div id="setup-screen" class="section board">
        <h2 style="text-align:center; color:var(--gold); font-size:2.5em; margin-top:0; text-shadow: 0 0 10px rgba(255,215,0,0.5);">🎪 G1 TURF CASINO</h2>
        
        <!-- 保存済み設定読み込み -->
        <div class="config-preset">
            <label style="font-size:12px; color:#aaa; display:block; margin-bottom:8px;">💾 保存済み設定から読み込む</label>
            <div style="display:flex; gap:5px;">
                <select id="presetSelect" style="flex:1;">
                    <option value="">-- 新規設定 --</option>
                </select>
                <button class="mini-btn" style="background:var(--blue); flex:0.5;" onclick="loadPreset()">読込</button>
                <button class="mini-btn" style="background:#666; flex:0.5;" onclick="deletePreset()">削</button>
            </div>
        </div>

        <input type="text" id="roomName" placeholder="🔐 合言葉を入力">
        <input type="number" id="seriesCount" value="1" placeholder="総レース数" min="1" max="10">
        
        <!-- 設定保存 -->
        <button class="mini-btn" style="background:#444; width:100%; margin:10px 0;" onclick="savePreset()">⚙️ この設定を保存</button>
        
        <button class="btn" onclick="initPeer('monitor')">📺 モニター起動</button>
        <button class="btn" onclick="initPeer('controller')" style="background:var(--blue); color:#fff;">🎮 操作パネル接続</button>
        <button class="btn" onclick="initPeer('guest')" style="background:#fff; color:#000;">👥 ゲスト参加</button>
    </div>

    <!-- 2. データ管理 -->
    <div id="registration-area" class="section hidden">
        <div class="board">
            <h3 id="form-title" style="margin:0 0 15px 0; color:var(--gold); font-size:1.5em;">🏁 レース登録</h3>
            <input type="hidden" id="editingId">
            <input type="text" id="raceName" placeholder="🏇 レース名">
            <input type="file" id="videoFile" accept="video/*">
            <div id="horse-inputs" style="margin-top:15px;"></div>
            <button class="mini-btn" onclick="addHorseField()" style="background:#444; width:100%; margin:10px 0;">+ 馬を追加</button>
            <button id="apply-btn" class="btn" onclick="applyToPool()" style="background:var(--accent); color:#000; margin-bottom:10px;">💾 保存して一覧を更新</button>
            <button id="cancel-edit-btn" class="mini-btn hidden" onclick="resetForm()" style="background:#666; width:100%;">キャンセル</button>
        </div>
        <div id="race-list-display"></div>
    </div>

    <!-- 3. 操作パネル -->
    <div id="controller-screen" class="section hidden board">
        <h3 id="ctrl-race-title" style="text-align:center; color:var(--gold); font-size:2em; margin:0 0 20px 0;">⏳ READY</h3>
        <div id="ctrl-pre-race" class="hidden">
            <button class="btn" onclick="requestCountdown()" style="background:var(--red); color:#fff;">🔥 カウントダウン開始</button>
        </div>
        <div id="ctrl-post-race" class="hidden">
            <button class="btn" onclick="requestCloseResult()" style="background:var(--blue); color:#fff;">👁️ リザルトを閉じる</button>
        </div>
        <div id="ctrl-final-action" class="hidden">
            <button class="btn" onclick="requestSystemReset()" style="background:var(--accent); color:#000;">🔄 最初からやり直す</button>
        </div>
        <div id="ctrl-next-action" class="hidden">
            <button class="btn" onclick="requestPickRace()" style="background:var(--gold); color:#000;">🎲 次のレースを抽選</button>
        </div>
        <button id="initialPickBtn" class="btn" onclick="requestPickRace()" style="margin-top:0;">🎲 レースを抽選開始</button>
    </div>

    <!-- 4. モニター -->
    <div id="monitor-screen" class="section hidden board" style="text-align:center;">
        <p id="mon-status" style="color:var(--accent); margin:0 0 10px 0; font-size:1.2em; font-weight:bold;">RACE STATUS</p>
        <h1 id="mon-race-name" style="color:var(--gold); font-size:2.5em; margin:10px 0 20px 0;">READY</h1>
        <div id="mon-odds-list" style="text-align:left; border-top:2px solid rgba(255,215,0,0.3); padding-top:15px;"></div>
    </div>

    <!-- 5. ゲスト名入力 -->
    <div id="guest-join-screen" class="section hidden board">
        <h3 style="text-align:center; color:var(--gold); font-size:1.8em; margin-top:0;">👋 ようこそ</h3>
        <input type="text" id="playerName" placeholder="💰 お名前を入力">
        <button class="btn" onclick="guestJoin()" style="margin-top:20px;">🎫 入場</button>
    </div>

    <!-- 6. ゲスト馬券画面 -->
    <div id="guest-screen" class="section hidden board">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom:2px solid rgba(255,215,0,0.3); padding-bottom:15px;">
            <b id="display-name" style="color:var(--gold); font-size:1.3em;">---</b>
            <span style="font-weight:bold; font-size:1.3em;">💰 <b id="my-chips" style="color:var(--accent);">1000</b></span>
        </div>
        <div id="betting-area"></div>
    </div>
</div>

<video id="mainVideo" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; z-index:9999;" playsinline></video>

<script>
let racePool = [], videoMap = new Map();
let peer = null, connections = [], connToMonitor = null;
let currentRace = null, myChips = 1000, currentRaceNum = 0, seriesTotal = 0;
let tempBets = {}, confirmedBets = {}, guestBalances = {}, myRole = '';
const STORAGE_KEY = 'turf_v24_final';
const PRESET_KEY = 'turf_presets';

window.onload = () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) racePool = JSON.parse(saved);
    updateRaceListUI();
    updatePresetSelect();
};

// --- 設定プリセット管理 ---
function updatePresetSelect() {
    const presets = getPresets();
    const select = document.getElementById('presetSelect');
    select.innerHTML = '<option value="">-- 新規設定 --</option>';
    presets.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.innerText = `${p.name} (${p.roomName})`;
        select.appendChild(opt);
    });
}

function getPresets() {
    const data = localStorage.getItem(PRESET_KEY);
    return data ? JSON.parse(data) : [];
}

function savePreset() {
    const name = prompt('この設定に名前をつけてください:');
    if(!name) return;
    const presets = getPresets();
    const preset = {
        id: 'preset_' + Date.now(),
        name: name,
        roomName: document.getElementById('roomName').value,
        seriesCount: document.getElementById('seriesCount').value
    };
    presets.push(preset);
    localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
    updatePresetSelect();
    alert(`「${name}」として保存しました`);
}

function loadPreset() {
    const presetId = document.getElementById('presetSelect').value;
    if(!presetId) return;
    const presets = getPresets();
    const preset = presets.find(p => p.id === presetId);
    if(preset) {
        document.getElementById('roomName').value = preset.roomName;
        document.getElementById('seriesCount').value = preset.seriesCount;
    }
}

function deletePreset() {
    const presetId = document.getElementById('presetSelect').value;
    if(!presetId) return;
    if(!confirm('この設定を削除しますか？')) return;
    let presets = getPresets();
    presets = presets.filter(p => p.id !== presetId);
    localStorage.setItem(PRESET_KEY, JSON.stringify(presets));
    updatePresetSelect();
    document.getElementById('presetSelect').value = '';
    alert('削除しました');
}

// --- 通信コア ---
function initPeer(role) {
    const room = document.getElementById('roomName').value;
    if(!room) return;
    myRole = role;
    const pid = (role === 'monitor') ? room : room + "_" + role + "_" + Math.random().toString(36).slice(-4);
    peer = new Peer(pid);
    peer.on('open', () => {
        document.getElementById('nav-tabs').classList.add('hidden');
        if(role === 'monitor') {
            seriesTotal = parseInt(document.getElementById('seriesCount').value) || 1;
            showSection('monitor-screen');
            peer.on('connection', c => { connections.push(c); c.on('data', d => handleData(d, c)); });
        } else {
            connToMonitor = peer.connect(room);
            connToMonitor.on('open', () => {
                connToMonitor.on('data', d => handleData(d));
                showSection(role === 'controller' ? 'controller-screen' : 'guest-join-screen');
            });
        }
    });
}

function handleData(d, senderConn = null) {
    if(myRole === 'monitor') {
        if(d.type === 'JOIN') guestBalances[senderConn.peer] = { name: d.name, chips: 1000 };
        if(d.type === 'REQ_PICK') {
            currentRaceNum++;
            const pick = racePool[Math.floor(Math.random()*racePool.length)];
            currentRace = JSON.parse(JSON.stringify(pick));
            currentRace.horses.forEach(h => { h.pool=0; h.bets={}; h.currentOdds=h.initialOdds; });
            broadcast({ type: 'RACE_SET', race: currentRace, num: currentRaceNum, total: seriesTotal });
            renderMonitorUI();
        }
        if(d.type === 'BET') {
            const h = currentRace.horses[d.idx];
            h.pool += d.amount;
            h.bets[senderConn.peer] = (h.bets[senderConn.peer]||0) + d.amount;
            guestBalances[senderConn.peer].chips -= d.amount;
            updateOdds();
            broadcast({ type: 'UPDATE_STATE', horses: currentRace.horses, balances: guestBalances });
            renderMonitorUI();
        }
        if(d.type === 'REQ_COUNTDOWN') {
            const t = Date.now() + 10500;
            broadcast({ type: 'COUNT_SYNC', t });
            startMonitorCountdown(t);
        }
        if(d.type === 'REQ_CLOSE_RES') {
            if(currentRaceNum >= seriesTotal) {
                const rank = Object.values(guestBalances).sort((a,b)=>b.chips-a.chips);
                broadcast({ type: 'SHOW_RANKING', rank });
                showRankingUI(rank);
            } else {
                broadcast({ type: 'CLOSE_UI' });
                document.getElementById('result-screen').style.display = 'none';
            }
        }
        if(d.type === 'REQ_RESET') {
            currentRaceNum = 0;
            guestBalances = {};
            currentRace = null;
            broadcast({ type: 'RESET_STATE' });
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('mon-race-name').innerText = "READY";
            document.getElementById('mon-odds-list').innerHTML = "";
            document.getElementById('mon-status').innerText = "";
        }
    }

    // クライアント側の処理
    if(d.type === 'RACE_SET') {
        currentRace = d.race; currentRaceNum = d.num; seriesTotal = d.total;
        tempBets = {}; confirmedBets = {};
        document.getElementById('result-screen').style.display = 'none';
        if(myRole === 'controller') { updateCtrlUI('pre-race'); document.getElementById('ctrl-race-title').innerText = `🏇 RACE ${currentRaceNum}/${seriesTotal}`; }
        if(myRole === 'guest') renderGuestBetting();
    }
    if(d.type === 'UPDATE_STATE') {
        currentRace.horses = d.horses;
        if(myRole === 'guest' && d.balances[peer.id]) { myChips = d.balances[peer.id].chips; updateGuestChipsUI(); updateGuestOddsUI(); }
    }
    if(d.type === 'RESULT_PACK') {
        if(myRole === 'controller') updateCtrlUI('post-race');
        showVisualResult(d);
    }
    if(d.type === 'SHOW_RANKING') {
        if(myRole === 'controller') updateCtrlUI('final-action');
        showRankingUI(d.rank);
    }
    if(d.type === 'CLOSE_UI') {
        document.getElementById('result-screen').style.display = 'none';
        if(myRole === 'controller') updateCtrlUI('next-action');
    }
    if(d.type === 'RESET_STATE') {
        document.getElementById('result-screen').style.display = 'none';
        if(myRole === 'controller') {
            updateCtrlUI('initial');
            document.getElementById('ctrl-race-title').innerText = "⏳ READY";
        }
        if(myRole === 'guest') {
            myChips = 1000;
            document.getElementById('playerName').value = "";
            showSection('guest-join-screen');
        }
    }
}

// モニター用
function startMonitorCountdown(targetTime) {
    const o = document.getElementById('countdown-overlay'); o.style.display = 'block';
    const timer = setInterval(() => {
        const rem = Math.ceil((targetTime - Date.now()) / 1000);
        if(rem <= 0) { clearInterval(timer); o.style.display = 'none'; playVideo(); }
        else o.innerText = rem;
    }, 100);
}
async function playVideo() {
    const v = document.getElementById('mainVideo'); const url = videoMap.get(currentRace.id);
    if(!url) return finalizeRace();
    v.src = url; v.style.display = 'block';
    try { await v.play(); } catch(e) { v.muted = true; await v.play(); }
    v.onended = () => { v.style.display = 'none'; finalizeRace(); };
}
function finalizeRace() {
    const winner = currentRace.horses.find(h => h.rank === 1);
    const payouts = Object.keys(guestBalances).map(pid => {
        const win = Math.floor((winner.bets[pid] || 0) * winner.currentOdds);
        guestBalances[pid].chips += win;
        return { name: guestBalances[pid].name, win };
    });
    broadcast({ type: 'RESULT_PACK', winner: winner.name, payouts });
    showVisualResult({ winner: winner.name, payouts });
}

// ゲスト操作
function guestJoin() { 
    const n = document.getElementById('playerName').value; 
    if(n && connToMonitor) { 
        connToMonitor.send({type:'JOIN', name:n}); 
        showSection('guest-screen'); 
        document.getElementById('display-name').innerText = n; 
        document.getElementById('my-chips').innerText = "1000";
    } 
}
function changeBet(i, a) { if(myChips >= a) { myChips -= a; tempBets[i] = (tempBets[i]||0) + a; updateGuestChipsUI(); updateBetRow(i); } }
function cancelBet(i) { myChips += (tempBets[i] || 0); tempBets[i] = 0; updateGuestChipsUI(); updateBetRow(i); }
function confirmBet(i) {
    const a = tempBets[i]||0; if(a <= 0) return;
    confirmedBets[i] = (confirmedBets[i]||0) + a;
    connToMonitor.send({ type: 'BET', idx: i, amount: a });
    tempBets[i] = 0; updateBetRow(i);
}
function updateBetRow(i) { document.getElementById(`g-status-${i}`).innerText = `確定: ${confirmedBets[i]||0} / 準備: ${tempBets[i]||0}`; }
function updateGuestChipsUI() { document.getElementById('my-chips').innerText = myChips; }
function updateGuestOddsUI(){ currentRace.horses.forEach((h,i) => { const el=document.getElementById(`g-odd-${i}`); if(el) el.innerText='x'+h.currentOdds.toFixed(2); }); }

function renderGuestBetting() {
    document.getElementById('betting-area').innerHTML = currentRace.horses.map((h, i) => `
        <div class="betting-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="horse-name">🏇 ${h.name}</div>
                <div class="odds-display">x${h.currentOdds.toFixed(2)}</div>
            </div>
            <div class="status-line" id="g-status-${i}">確定: 0 / 準備: 0</div>
            <div class="bet-buttons">
                <button class="mini-btn" style="background:#444; flex:1;" onclick="changeBet(${i},10)">+10</button>
                <button class="mini-btn" style="background:#444; flex:1;" onclick="changeBet(${i},100)">+100</button>
                <button class="mini-btn" style="background:var(--red); flex:1;" onclick="cancelBet(${i})">取消</button>
                <button class="mini-btn" style="background:var(--accent); color:#000; flex:1.5; font-weight:bold;" onclick="confirmBet(${i})">確定</button>
            </div>
        </div>`).join('');
}

// UI更新
function showVisualResult(d) {
    if(myRole === 'controller') return;
    const screen = document.getElementById('result-screen'); screen.style.display = 'flex';
    document.getElementById('res-race-part').classList.remove('hidden');
    document.getElementById('res-final-part').classList.add('hidden');
    document.getElementById('res-winner').innerText = d.winner;
    document.getElementById('res-payout-list').innerHTML = d.payouts.map(p => `
        <div class="payout-item">
            <span class="payout-name">${p.name}</span>
            <span class="payout-amount">+${p.win}</span>
        </div>`).join('');
}
function showRankingUI(rankData) {
    if(myRole === 'controller') return;
    const screen = document.getElementById('result-screen'); screen.style.display = 'flex';
    document.getElementById('res-race-part').classList.add('hidden');
    document.getElementById('res-final-part').classList.remove('hidden');
    const medals = ['🥇', '🥈', '🥉'];
    document.getElementById('final-rank-list').innerHTML = rankData.map((r,i) => `
        <div class="rank-item">
            <div class="rank-medal">${medals[i] || '🏅'}</div>
            <div class="rank-info">
                <div class="rank-name">${i+1}位: ${r.name}</div>
                <div class="rank-chips">💰 ${r.chips}</div>
            </div>
        </div>`).join('');
}
function updateCtrlUI(state) {
    ['ctrl-pre-race', 'ctrl-post-race', 'ctrl-final-action', 'ctrl-next-action', 'initialPickBtn'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(state === 'pre-race') document.getElementById('ctrl-pre-race').classList.remove('hidden');
    else if(state === 'post-race') document.getElementById('ctrl-post-race').classList.remove('hidden');
    else if(state === 'final-action') document.getElementById('ctrl-final-action').classList.remove('hidden');
    else if(state === 'next-action') document.getElementById('ctrl-next-action').classList.remove('hidden');
    else if(state === 'initial') document.getElementById('initialPickBtn').classList.remove('hidden');
}

// 登録・管理
function updateRaceListUI() {
    const container = document.getElementById('race-list-display');
    container.innerHTML = racePool.map(r => `<div class="race-card"><div><b>🏇 ${r.name}</b></div><div><button class="mini-btn" style="background:var(--blue);" onclick="editRace('${r.id}')">編集</button> <button class="mini-btn" style="background:var(--red);" onclick="deleteRace('${r.id}')">削除</button></div></div>`).join('');
}
function openEditor() { showSection('registration-area'); resetForm(); updateRaceListUI(); }
function addHorseField(data = null) {
    const div = document.createElement('div'); div.className = "horse-input-row";
    div.innerHTML = `<input type="text" placeholder="馬名" class="h-name" value="${data?data.name:''}"> <input type="number" step="0.1" class="h-odds" value="${data?data.initialOdds:'2.0'}"> <select class="h-rank" style="padding:8px;"><option value="">順位</option><option value="1" ${data?.rank===1?'selected':''}>1位</option><option value="2" ${data?.rank===2?'selected':''}>2位</option><option value="3" ${data?.rank===3?'selected':''}>3位</option></select> <button class="mini-btn" style="background:var(--red); padding:8px; margin:0;" onclick="this.parentElement.remove()">×</button>`;
    document.getElementById('horse-inputs').appendChild(div);
}
function applyToPool() {
    const name = document.getElementById('raceName').value.trim(); if(!name) return;
    const id = document.getElementById('editingId').value || "R_" + Date.now();
    const horses = Array.from(document.querySelectorAll('.horse-input-row')).map(row => ({ name: row.querySelector('.h-name').value || "無名", initialOdds: parseFloat(row.querySelector('.h-odds').value) || 1.5, rank: parseInt(row.querySelector('.h-rank').value) || 0 }));
    const file = document.getElementById('videoFile').files[0]; if(file) videoMap.set(id, URL.createObjectURL(file));
    const idx = racePool.findIndex(r => r.id === id);
    if(idx > -1) racePool[idx] = {id, name, horses}; else racePool.push({id, name, horses});
    localStorage.setItem(STORAGE_KEY, JSON.stringify(racePool)); resetForm(); updateRaceListUI(); alert("保存しました");
}
function resetForm() { document.getElementById('editingId').value = ""; document.getElementById('raceName').value = ""; document.getElementById('horse-inputs').innerHTML = ""; addHorseField(); addHorseField(); }
function editRace(id) {
    const r = racePool.find(x => x.id === id); if(!r) return;
    document.getElementById('editingId').value = r.id; document.getElementById('raceName').value = r.name;
    document.getElementById('horse-inputs').innerHTML = ""; r.horses.forEach(h => addHorseField(h));
    window.scrollTo(0,0);
}
function deleteRace(id) { if(!confirm("削除しますか？")) return; racePool = racePool.filter(r => r.id !== id); localStorage.setItem(STORAGE_KEY, JSON.stringify(racePool)); updateRaceListUI(); }

// モニター通信用
function renderMonitorUI() {
    document.getElementById('mon-status').innerText = `🏁 RACE ${currentRaceNum} / ${seriesTotal}`;
    document.getElementById('mon-race-name').innerText = currentRace.name;
    document.getElementById('mon-odds-list').innerHTML = currentRace.horses.map(h => `
        <div class="horse-stat">
            <span style="font-weight:bold;">🏇 ${h.name}</span>
            <span style="color:var(--gold); font-weight:bold;">x${h.currentOdds.toFixed(2)} <span style="color:var(--accent);">(${h.pool})</span></span>
        </div>`).join('');
}
function updateOdds() {
    const total = currentRace.horses.reduce((s, h) => s + h.pool, 0);
    currentRace.horses.forEach(h => { const adj = 200; h.currentOdds = Math.max(1.1, (total + adj) / (h.pool + (adj / h.initialOdds))); });
}

function broadcast(d) { connections.forEach(c => c.open && c.send(d)); }
function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
function requestPickRace() { if(connToMonitor) connToMonitor.send({ type: 'REQ_PICK' }); }
function requestCountdown() { if(connToMonitor) connToMonitor.send({ type: 'REQ_COUNTDOWN' }); }
function requestCloseResult() { if(connToMonitor) connToMonitor.send({ type: 'REQ_CLOSE_RES' }); }
function requestSystemReset() { if(connToMonitor) connToMonitor.send({ type: 'REQ_RESET' }); }
</script>
</body>
